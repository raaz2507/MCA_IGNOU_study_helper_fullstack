<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 330" role="img" aria-labelledby="title desc">
  <title id="title">GyanPath student learning journey</title><desc id="desc">Choose a semester, open a subject, study resources, and track progress.</desc>
  <defs><linearGradient id="bg" x1="0" x2="1"><stop stop-color="#fff7ed"/><stop offset="1" stop-color="#eef2ff"/></linearGradient></defs><rect width="1200" height="330" rx="28" fill="url(#bg)"/>
  <path d="M160 160h880" stroke="#c4b5fd" stroke-width="12" stroke-linecap="round"/>
  <g font-family="Arial,sans-serif" text-anchor="middle" font-weight="700">
    <g transform="translate(160 65)"><circle cy="95" r="58" fill="#7c3aed"/><text y="105" fill="#fff" font-size="36">1</text><text y="190" fill="#4c1d95" font-size="21">Choose Semester</text></g>
    <g transform="translate(450 65)"><circle cy="95" r="58" fill="#2563eb"/><text y="105" fill="#fff" font-size="36">2</text><text y="190" fill="#1e3a8a" font-size="21">Open Subject</text></g>
    <g transform="translate(750 65)"><circle cy="95" r="58" fill="#0891b2"/><text y="105" fill="#fff" font-size="36">3</text><text y="190" fill="#164e63" font-size="21">Study Resources</text></g>
    <g transform="translate(1040 65)"><circle cy="95" r="58" fill="#16a34a"/><text y="105" fill="#fff" font-size="36">✓</text><text y="190" fill="#14532d" font-size="21">Track Progress</text></g>
  </g>
</svg>
